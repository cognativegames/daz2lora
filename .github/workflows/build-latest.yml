name: Build Latest

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install -e . pyinstaller

      - name: Resolve version
        shell: bash
        run: |
          V=$(git describe --tags --always --dirty)
          # If result is a bare hash (no tags), prefix with "latest-"
          echo "$V" | grep -Eq '^[0-9a-f]{7,}(-dirty)?$' && V="latest-$V" || true
          # Strip leading "v" so the display stays as "v{VERSION}"
          V="${V#v}"
          echo "$V" > VERSION
          echo "DAZ2LORA_VERSION=$V" >> $GITHUB_ENV

      - name: Build
        run: |
          pyinstaller --noconfirm `
            --name "daz2lora" `
            --windowed `
            --add-data "src/daz2lora/daz_scripts;daz2lora/daz_scripts" `
            --add-data "VERSION;." `
            --paths "src" `
            --distpath "dist" `
            --workpath "build" `
            src/daz2lora/main.py

      - name: Copy .dsa alongside exe
        shell: powershell
        run: Copy-Item src\daz2lora\daz_scripts\daz2lora.dsa dist\daz2lora\

      - name: Package
        run: Compress-Archive -Path dist\daz2lora\* -DestinationPath dist\daz2lora-latest.zip

      - name: Delete old latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          body: "Auto-built from ${{ github.sha }} on main"
          files: dist/daz2lora-latest.zip
          prerelease: true
          make_latest: "false"
